# @date 2026-03-03

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: simpledbms-backend:latest
    container_name: simpledbms-backend
    expose:
      - "3000"
    restart: unless-stopped
    volumes:
      - ./mydb.db:/app/mydb.db
      - ./mydb.wal:/app/mydb.wal

  frontend:
    image: nginx:alpine
    container_name: simpledbms-frontend
    ports:
      - "3000:80"
    volumes:
      - ./src/frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
