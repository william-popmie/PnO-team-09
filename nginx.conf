server {
    listen       80;
    server_name  localhost;

    # Set root to where the frontend files are mounted
    root /usr/share/nginx/html;

    # Add index.html to the list of default files
    index components/simpledbmswebclient.html;

    # Route requests for the root path to the main UI
    location = / {
        return 301 /components/simpledbmswebclient.html;
    }

    # Serve static assets
    location /components/ {
        try_files $uri $uri/ =404;
    }

    location /styles/ {
        try_files $uri $uri/ =404;
    }

    location /scripts/ {
        try_files $uri $uri/ =404;
    }

    # Proxy API requests to the backend container
    location /db/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
