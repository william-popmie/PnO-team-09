syntax = "proto3";

package raft;

service RaftService {
    rpc RequestVote (RequestVoteRequest) returns (RequestVoteResponse);
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
    rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
}

message RequestVoteRequest {
    int32 term         = 1;
    string candidateId = 2;
    int32 lastLogIndex = 3;
    int32 lastLogTerm  = 4;
    bool preVote       = 5;
}

message RequestVoteResponse {
    int32 term       = 1;
    bool voteGranted = 2;
}

message Command {
    string type  = 1;
    bytes payload = 2;
}

message LogEntry {
    int32   term    = 1;
    int32   index   = 2;
    string  type    = 3;
    Command command = 4;
    string config   = 5;
}

message AppendEntriesRequest {
    int32            term         = 1;
    string           leaderId     = 2;
    int32            prevLogIndex = 3;
    int32            prevLogTerm  = 4;
    repeated LogEntry entries     = 5;
    int32            leaderCommit = 6;
}

message AppendEntriesResponse {
    int32 term          = 1;
    bool  success       = 2;
    bool  hasMatchIndex = 3;
    int32 matchIndex    = 4;
    bool  hasConflictIndex = 5;
    int32 conflictIndex = 6;
    bool  hasConflictTerm  = 7;
    int32 conflictTerm  = 8;
}

message InstallSnapshotRequest {
    int32 term = 1;
    string leaderId = 2;
    int32 lastIncludedIndex = 3;
    int32 lastIncludedTerm = 4;
    bytes data = 5;
    string config = 6;
    int64 offset = 7;
    bool done = 8;
}

message  InstallSnapshotResponse {
    int32 term = 1;
    bool success = 2;
}
