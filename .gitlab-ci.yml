image: node:24

stages:
  - build
  - test
  - coverage
  - lint
  - prettier-check
  - deploy-docs

cache:
  paths:
    - node_modules/

download_dependencies:
  stage: build
  script:
    - npm ci
    - npm run build

npm_test:
  stage: test
  script:
    - npm test

coverage:
  stage: coverage
  script:
    - npm run coverage

eslint:
  stage: lint
  script:
    - npm run lint

prettier-check:
  stage: prettier-check
  script:
    - npm run prettier-check

pages:
  stage: deploy-docs
  script:
    - cd raft-consensus-algorithm
    - npm ci --ignore-scripts
    - npm run build --workspace @maboke123/raft-core
    - npm run build --workspace @maboke123/raft-grpc
    - npm run docs
    - mkdir -p ../public
    - cp -r docs/* ../public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
